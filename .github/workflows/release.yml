name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
            artifact: skill-vault-darwin-arm64
          - os: macos-13
            target: darwin-x64
            artifact: skill-vault-darwin-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build binary
        run: bun build --compile --minify src/cli.ts --outfile ${{ matrix.artifact }}

      - name: Verify binary
        run: ./${{ matrix.artifact }} --version

      - name: Compress binary
        run: tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            skill-vault-darwin-arm64.tar.gz
            skill-vault-darwin-x64.tar.gz

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          repository: leolobmaier/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Get release info
        id: release
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          ARM64_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/skill-vault-darwin-arm64.tar.gz"
          X64_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/skill-vault-darwin-x64.tar.gz"

          curl -sL "$ARM64_URL" -o arm64.tar.gz
          curl -sL "$X64_URL" -o x64.tar.gz

          ARM64_SHA=$(sha256sum arm64.tar.gz | cut -d' ' -f1)
          X64_SHA=$(sha256sum x64.tar.gz | cut -d' ' -f1)

          echo "arm64_sha=$ARM64_SHA" >> "$GITHUB_OUTPUT"
          echo "x64_sha=$X64_SHA" >> "$GITHUB_OUTPUT"

      - name: Update formula
        run: |
          cat > homebrew-tap/Formula/skill-vault.rb << 'FORMULA'
          class SkillVault < Formula
            desc "Local web app to discover and display AI coding tool skills"
            homepage "https://github.com/${{ github.repository }}"
            version "${{ steps.release.outputs.version }}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/skill-vault-darwin-arm64.tar.gz"
                sha256 "${{ steps.release.outputs.arm64_sha }}"
              else
                url "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/skill-vault-darwin-x64.tar.gz"
                sha256 "${{ steps.release.outputs.x64_sha }}"
              end
            end

            def install
              if Hardware::CPU.arm?
                bin.install "skill-vault-darwin-arm64" => "skill-vault"
              else
                bin.install "skill-vault-darwin-x64" => "skill-vault"
              end
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/skill-vault --version")
            end
          end
          FORMULA

      - name: Push formula update
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/skill-vault.rb
          git commit -m "Update skill-vault to ${{ steps.release.outputs.version }}"
          git push
